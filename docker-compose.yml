x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &restart-policy
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    container_name: saferide-postgres
    <<: *restart-policy
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: saferide
      POSTGRES_USER: saferide
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saferide_secret_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saferide -d saferide"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: saferide-redis
    <<: *restart-policy
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-saferide_redis_2024}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD:-saferide_redis_2024} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  mosquitto:
    build:
      context: ./docker/mosquitto
      dockerfile: Dockerfile
    container_name: saferide-mosquitto
    <<: *restart-policy
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
      - mosquitto-auth:/mosquitto/auth
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    environment:
      MOSQUITTO_PASSWORD: ${MOSQUITTO_PASSWORD:?MOSQUITTO_PASSWORD is required}
      MQTT_USERNAME: ${MQTT_USERNAME:-saferide-backend}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?MQTT_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 mosquitto_sub -t '$$SYS/broker/version' -u saferide-health -P ${MOSQUITTO_PASSWORD} -C 1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 64M

  osrm:
    image: osrm/osrm-backend:v5.27.1
    container_name: saferide-osrm
    <<: *restart-policy
    ports:
      - "5000:5000"
    volumes:
      - osrm-data:/data
    command: osrm-routed --algorithm mld /data/nepal-latest.osrm
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: saferide-uptime-kuma
    <<: *restart-policy
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - frontend
      - backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saferide-backend
    <<: *restart-policy
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://saferide:${POSTGRES_PASSWORD:-saferide_secret_2024}@postgres:5432/saferide?schema=public
      REDIS_URL: redis://default:${REDIS_PASSWORD:-saferide_redis_2024}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      MQTT_URL: ${MQTT_URL:-mqtt://mosquitto:1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-saferide-backend}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?MQTT_PASSWORD is required}
      OSRM_URL: ${OSRM_URL:-http://osrm:5000}
    volumes:
      - mosquitto-auth:/mosquitto-auth
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - backend
      - frontend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: saferide-admin
    <<: *restart-policy
    ports:
      - "${ADMIN_WEB_PORT:-5173}:5173"
    volumes:
      - ./admin-web/src:/app/src
    depends_on:
      - backend
    networks:
      - frontend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  parent-web:
    build:
      context: ./parent-web
      dockerfile: Dockerfile
    container_name: saferide-parent
    <<: *restart-policy
    ports:
      - "${PARENT_WEB_PORT:-5174}:5173"
    volumes:
      - ./parent-web/src:/app/src
    depends_on:
      - backend
    networks:
      - frontend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  pgdata:
  redis-data:
  mosquitto-data:
  mosquitto-log:
  mosquitto-auth:
  osrm-data:
  uptime-kuma-data:

networks:
  backend:
    driver: bridge
    internal: false
  frontend:
    driver: bridge
