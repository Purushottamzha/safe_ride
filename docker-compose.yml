version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &restart-policy
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    container_name: saferide-postgres
    <<: *restart-policy
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: saferide
      POSTGRES_USER: saferide
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saferide_secret_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saferide -d saferide"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: saferide-redis
    <<: *restart-policy
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-saferide_redis_2024}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saferide-backend
    <<: *restart-policy
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://saferide:${POSTGRES_PASSWORD:-saferide_secret_2024}@postgres:5432/saferide?schema=public
      REDIS_URL: redis://default:${REDIS_PASSWORD:-saferide_redis_2024}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: saferide-admin
    <<: *restart-policy
    ports:
      - "${ADMIN_WEB_PORT:-5173}:5173"
    volumes:
      - ./admin-web/src:/app/src
    depends_on:
      - backend
    networks:
      - frontend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  parent-web:
    build:
      context: ./parent-web
      dockerfile: Dockerfile
    container_name: saferide-parent
    <<: *restart-policy
    ports:
      - "${PARENT_WEB_PORT:-5174}:5173"
    volumes:
      - ./parent-web/src:/app/src
    depends_on:
      - backend
    networks:
      - frontend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  pgdata:
  redis-data:

networks:
  backend:
    driver: bridge
    internal: false
  frontend:
    driver: bridge
