name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: saferide
          POSTGRES_USER: saferide
          POSTGRES_PASSWORD: saferide_secret_2024
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://saferide:saferide_secret_2024@localhost:5432/saferide?schema=public

      - name: Run Prisma migrate
        run: npx prisma migrate dev --name init
        working-directory: backend
        env:
          DATABASE_URL: postgresql://saferide:saferide_secret_2024@localhost:5432/saferide?schema=public

      - name: Run lint
        run: npm run lint
        working-directory: backend

      - name: Run tests
        run: npm test
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Upload backend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: backend
        continue-on-error: true

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            admin-web/package-lock.json
            parent-web/package-lock.json

      - name: Install admin-web dependencies
        run: npm ci
        working-directory: admin-web

      - name: Build admin-web
        run: npm run build
        working-directory: admin-web

      - name: Upload admin-web build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-web-dist
          path: admin-web/dist/

      - name: Install parent-web dependencies
        run: npm ci
        working-directory: parent-web

      - name: Build parent-web
        run: npm run build
        working-directory: parent-web

      - name: Upload parent-web build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parent-web-dist
          path: parent-web/dist/

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, frontend-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: saferide-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build admin-web Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./admin-web
          push: false
          tags: saferide-admin-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build parent-web Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./parent-web
          push: false
          tags: saferide-parent-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [docker-build, security]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deployment would run here with configured secrets"
          # docker compose -f docker-compose.yml up -d
        shell: bash
