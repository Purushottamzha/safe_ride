route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - receiver: 'critical'
      match:
        severity: critical
      repeat_interval: 1h

receivers:
  - name: 'default'
    slack_configs:
      - send_resolved: true
        channel: '#saferide-alerts'
        api_url: 'https://hooks.slack.com/services/your-webhook-url'
  - name: 'critical'
    slack_configs:
      - send_resolved: true
        channel: '#saferide-critical'
        api_url: 'https://hooks.slack.com/services/your-webhook-url'
