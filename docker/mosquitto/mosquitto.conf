# SafeRide Nepal — Mosquitto MQTT Broker Configuration
# Applied as a bind-mount into /mosquitto/config/mosquitto.conf

# Listeners
listener 1883
protocol mqtt

listener 9001
protocol websockets

# Security — anonymous access disabled
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistence
persistence true
persistence_location /mosquitto/data/
autosave_interval 1800
autosave_on_changes true

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
connection_messages true
log_timestamp true

# Per-listener security settings (explicit — no override from listeners above)
listener 1883
allow_anonymous false

listener 9001
allow_anonymous false

# Topic prefix restriction: only saferide/ topics are allowed
# (prevents a compromised device from publishing to unrelated topics
#  that might be consumed by other tenants on a shared broker)
acl_file /mosquitto/config/acl

# Max connections, keepalive
max_connections -1
set_tcp_nodelay true
